<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simuladores - EduCodes</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css?v=2.0">
<link rel="stylesheet" href="../css/inscripcion.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="../javascript/session.js?v=2.0"></script>
    <script src="../javascript/chatbot.js?v=2.0"></script>
    <script src="../javascript/navbar.js?v=2.0"></script>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="../imagenes/educode_logo.png" alt="Logo EduCodes">
                <h1>EduCodes R.L.</h1>
            </div>
            <button class="hamburger" id="hamburger" aria-label="Menú">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="../html/sobre-nosotros.html">Sobre Nosotros</a></li>
                <li><a href="../html/cursos.html">Cursos</a></li>
                <li><a href="../html/simuladores.html">Simuladores</a></li>
                <li><a href="../html/planes.html">Planes</a></li>
                <li><a href="../html/foros.html">Foros</a></li>
                <li><a href="../html/consultas.html">Consultas</a></li>                
            </ul>
            <div id="login-container"></div>
        </nav>
    </header>

    <section class="form-section">
        <div class="form-box">
            <h2 class="form-title">¡Únete a EduCodes!</h2>
            <form id="inscription-form" onsubmit="return validateForm(event)">
                <div class="form-grid">
                    <!-- Datos Personales -->
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" required placeholder="Ej: Juan Pérez">
                    </div>
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" name="telefono" required placeholder="Ej: +503 8888-8888">
                    </div>
                    <div class="form-group">
                        <label for="fecha_nacimiento">Fecha de Nacimiento</label>
                        <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
                    </div>
                    <div class="form-group">
                        <label for="ocupacion">Ocupación Actual</label>
                        <input type="text" id="ocupacion" name="ocupacion" required placeholder="Ej: Estudiante">
                    </div>

                    <!-- Información Académica -->
                    <div class="form-group">
                        <label for="nivel_educativo">Nivel Educativo</label>
                        <select id="nivel_educativo" name="nivel_educativo" required>
                            <option value="">Seleccione una opción</option>
                            <option value="secundaria">Secundaria</option>
                            <option value="tecnico">Técnico</option>
                            <option value="universidad">Universidad</option>
                            <option value="postgrado">Postgrado</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="area_interes">Área de Interés Principal</label>
                        <select id="area_interes" name="area_interes" required>
                            <option value="">Seleccione una opción</option>
                            <option value="programacion">Programación</option>
                            <option value="redes">Redes</option>
                            <option value="seguridad">Seguridad Informática</option>
                            <option value="desarrollo_web">Desarrollo Web</option>
                            <option value="bases_datos">Bases de Datos</option>
                        </select>
                    </div>

                    <!-- Experiencia -->
                    <div class="form-group full-width">
                        <label for="experiencia">Experiencia Previa en Tecnología</label>
                        <textarea id="experiencia" name="experiencia" 
                            placeholder="Cuéntanos sobre tu experiencia previa en tecnología (si la tienes)"></textarea>
                    </div>

                    <!-- Motivación -->
                    <div class="form-group full-width">
                        <label for="motivacion">¿Por qué quieres unirte a EduCodes?</label>
                        <textarea id="motivacion" name="motivacion" required 
                            placeholder="Comparte con nosotros tus motivaciones para unirte a nuestra cooperativa"></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="submit-btn">Enviar Solicitud</button>
                </div>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 EduCodes. Todos los derechos reservados.</p>
    </footer>

    <script>
        function validateForm(event) {
            event.preventDefault();
            
            // Aquí puedes agregar tu lógica de validación
            alert('¡Formulario enviado con éxito! Nos pondremos en contacto contigo pronto.');
            document.getElementById('inscription-form').reset();
            
            return false;
        }
    </script>
</body>
</html>
