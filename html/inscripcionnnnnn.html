<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción - EduCodes R.L.</title>
    <style>
        /* Estilos generales y variables */
        :root {
            --primary-color: #1a094a;
            --secondary-color: #3b237e;
            --accent-color: #FF6F61;
            --text-color: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.05);
            --shadow: 0px 12px 30px rgba(0, 0, 0, 0.6);
        }

        body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    background-color: #1a094a;
    color: white;
    overflow-x: hidden;
    }

        /* Header y navegación */
        header {
    background-color: #1a094a;
    padding: 20px;
    box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.5);
    transition: background-color 0.3s ease, box-shadow 0.3s ease;
}

header:hover {
    background-color: #3b237e;
    box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.7);
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: inherit; /* Hereda el color del header */
    padding: 0; /* Ajusta el padding si es necesario */
}

/* Estilos para el logo */
.logo {
    display: flex;
    align-items: center;
}

.logo img {
    width: 85px; 
    height: 85px; 
    margin-right: 10px;
    transition: transform 0.3s ease, filter 0.3s ease, box-shadow 0.3s ease;
    
}

.logo img:hover {
    transform: scale(1.15);
    filter: brightness(1.3);
    box-shadow: 0px 0px 15px rgba(255, 255, 255, 0.6);
}

.nav-links {
    list-style-type: none;
    margin: 0;
    padding: 0;
    display: flex;
    gap: 20px;
}

.nav-links li {
    display: inline;
}

.nav-links a {
    color: white;
    text-decoration: none;
    font-size: 16px;
    position: relative;
    padding-bottom: 5px;
    transition: color 0.3s ease, transform 0.3s ease;
}

.nav-links a::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: 0;
    height: 2px;
    width: 100%;
    background-color: #ffffff;
    transform: scaleX(0);
    transition: transform 0.3s ease;
}

.nav-links a:hover::after {
    transform: scaleX(1);
}

        /* Sección del formulario */
        .form-section {
            min-height: calc(100vh - 200px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4rem 2rem;
            background: radial-gradient(circle at center, var(--secondary-color), var(--primary-color));
        }

        .form-box {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 1000px;
            box-shadow: var(--shadow);
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-box:hover {
            transform: translateY(-10px);
            box-shadow: 0px 15px 40px rgba(0, 0, 0, 0.7);
        }

        .form-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            color: var(--text-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            position: relative;
        }

        .form-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: var(--accent-color);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }

        .form-group {
            position: relative;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-color);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(255,111,97,0.3);
            background: rgba(255,255,255,0.1);
        }

        .form-group textarea {
            height: 120px;
            resize: vertical;
        }

        .form-group input:required + label::after,
        .form-group select:required + label::after,
        .form-group textarea:required + label::after {
            content: ' *';
            color: var(--accent-color);
        }

        .submit-btn {
            background: linear-gradient(45deg, var(--accent-color), #FF8F61);
            color: white;
            border: none;
            padding: 1rem 3rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 2rem;
            width: 100%;
            max-width: 300px;
            box-shadow: 0 4px 15px rgba(255,111,97,0.3);
        }

        .submit-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(255,111,97,0.4);
        }

        .form-actions {
            display: flex;
            justify-content: center;
            margin-top: 2rem;
        }

        /* Animaciones */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-box {
            animation: fadeIn 0.6s ease-out;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .nav-links {
                display: none;
            }

            .form-box {
                padding: 2rem;
            }

            .form-title {
                font-size: 2rem;
            }
        }

        /* Footer */
        footer {
            background: var(--primary-color);
            padding: 1rem;
            text-align: center;
            position: relative;
        }

        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255,255,255,0.3), 
                transparent);
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="../imagenes/educode_logo.png" alt="Logo EduCodes">
                <h1>EduCodes R.L.</h1>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="sobre-nosotros.html">Sobre Nosotros</a></li>
                <li><a href="cursos.html">Cursos</a></li>
                <li><a href="simuladores.html">Simuladores</a></li>
                <li><a href="../html/planes.html">Planes</a></li>
                <li><a href="foros.html">Foros</a></li>
                <li><a href="consultas.html">Consultas</a></li>
            </ul>
            <div id="login-container"></div>
        </nav>
    </header>

    <section class="form-section">
        <div class="form-box">
            <h2 class="form-title">¡Únete a EduCodes!</h2>
            <form id="inscription-form" onsubmit="return validateForm(event)">
                <div class="form-grid">
                    <!-- Datos Personales -->
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" required placeholder="Ej: Juan Pérez">
                    </div>
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" name="telefono" required placeholder="Ej: +503 8888-8888">
                    </div>
                    <div class="form-group">
                        <label for="fecha_nacimiento">Fecha de Nacimiento</label>
                        <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
                    </div>
                    <div class="form-group">
                        <label for="ocupacion">Ocupación Actual</label>
                        <input type="text" id="ocupacion" name="ocupacion" required placeholder="Ej: Estudiante">
                    </div>

                    <!-- Información Académica -->
                    <div class="form-group">
                        <label for="nivel_educativo">Nivel Educativo</label>
                        <select id="nivel_educativo" name="nivel_educativo" required>
                            <option value="">Seleccione una opción</option>
                            <option value="secundaria">Secundaria</option>
                            <option value="tecnico">Técnico</option>
                            <option value="universidad">Universidad</option>
                            <option value="postgrado">Postgrado</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="area_interes">Área de Interés Principal</label>
                        <select id="area_interes" name="area_interes" required>
                            <option value="">Seleccione una opción</option>
                            <option value="programacion">Programación</option>
                            <option value="redes">Redes</option>
                            <option value="seguridad">Seguridad Informática</option>
                            <option value="desarrollo_web">Desarrollo Web</option>
                            <option value="bases_datos">Bases de Datos</option>
                        </select>
                    </div>

                    <!-- Experiencia -->
                    <div class="form-group full-width">
                        <label for="experiencia">Experiencia Previa en Tecnología</label>
                        <textarea id="experiencia" name="experiencia" 
                            placeholder="Cuéntanos sobre tu experiencia previa en tecnología (si la tienes)"></textarea>
                    </div>

                    <!-- Motivación -->
                    <div class="form-group full-width">
                        <label for="motivacion">¿Por qué quieres unirte a EduCodes?</label>
                        <textarea id="motivacion" name="motivacion" required 
                            placeholder="Comparte con nosotros tus motivaciones para unirte a nuestra cooperativa"></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="submit-btn">Enviar Solicitud</button>
                </div>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 EduCodes. Todos los derechos reservados.</p>
    </footer>

    <script>
        function validateForm(event) {
            event.preventDefault();
            
            // Aquí puedes agregar tu lógica de validación
            alert('¡Formulario enviado con éxito! Nos pondremos en contacto contigo pronto.');
            document.getElementById('inscription-form').reset();
            
            return false;
        }
    </script>
</body>
</html>
